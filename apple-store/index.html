<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Store - Customize iPhone</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }

        .store-badge {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bf4800;
            font-weight: 600;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 20px;
            color: #86868b;
            font-weight: 400;
            margin: 0 0 30px 0;
        }

        img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.03);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
        }

        select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            background-color: #f5f5f7;
            font-size: 15px;
            color: #1d1d1f;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        select:focus, textarea:focus {
            border-color: #0071e3;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .btn-submit {
            width: 100%;
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #0077ed;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .footer-links a {
            color: #06c;
            font-size: 13px;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="store-badge">Apple Store</div>
        <h1>iPhone 14 Pro</h1>
        <h2>Customize your perfect model</h2>

        <img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-14-pro-finish-select-202209-6-7inch-gold?wid=512&hei=288&fmt=p-jpg&qlt=80&.v=1663703841907" alt="iPhone 14 Pro">

        <form>
            <!-- القائمة الأولى: الموديل -->
            <div class="form-group">
                <label for="select-model">Model. Which is best for you?</label>
                <select id="select-model" name="model">
                    <option value="iphone 12">iPhone 12</option>
                    <option value="iphone 12 pro">iPhone 12 Pro</option>
                    <option value="iphone 12 pro max">iPhone 12 Pro Max</option>
                    <option value="iphone 13 plus">iPhone 13 Plus</option>
                    <option value="iphone 13 pro">iPhone 13 Pro</option>
                    <option value="iphone 13 pro max">iPhone 13 Pro Max</option>
                    <option value="iphone 14 pro" selected>iPhone 14 Pro</option>
                    <option value="iphone 14 pro max">iPhone 14 Pro Max</option>
                </select>
            </div>

            <!-- القائمة الثانية: اللون -->
            <div class="form-group">
                <label for="select-finish">Finish. Pick your favorite</label>
                <select id="select-finish" name="finish">
                    <option value="gold" selected>Gold</option>
                    <option value="moonlight">Moonlight</option>
                    <option value="dark blue">Dark Blue</option>
                    <option value="black">Black</option>
                    <option value="deep purple">Deep Purple</option>
                    <option value="space black">Space Black</option>
                    <option value="silver">Silver</option>
                </select>
            </div>

            <!-- القائمة الثالثة: المساحة -->
            <div class="form-group">
                <label for="select-storage">Storage. How much space do you need?</label>
                <select id="select-storage" name="storage">
                    <option value="64gb">64GB</option>
                    <option value="128gb" selected>128GB</option>
                    <option value="256gb">256GB</option>
                    <option value="512gb">512GB</option>
                    <option value="1tb">1TB</option>
                </select>
            </div>

            <!-- خانة التعليقات -->
            <div class="form-group">
                <label for="message">Any comments on your order?</label>
                <textarea id="message" placeholder="Add details or special requests..."></textarea>
            </div>

            <button type="button" class="btn-submit">Submit Order</button>
        </form>

        <div class="footer-links">
            <a href="#">Help</a>
            <a href="#">Terms of Service</a>
        </div>
    </div>

</body>
</html>
